services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_api
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://postgres:resume_pass_2026@db:5432/resume_db

  db:
    image: postgres:15-alpine
    container_name: resume_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=resume_pass_2026
      - POSTGRES_DB=resume_db
      - TZ=Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
