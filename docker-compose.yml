services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: resume_api
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./assets:/app/assets
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://postgres:resume_pass_2026@db:5432/resume_db
      - ASSETS_DIR=/app/assets

  db:
    image: postgres:15-alpine
    container_name: resume_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=resume_pass_2026
      - POSTGRES_DB=resume_db
      - TZ=Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    image: node:20-alpine
    container_name: resume_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev
    depends_on:
      - api

volumes:
  pgdata:
