name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG..$TAG")
          else
            COMMITS=$(git log --pretty=format:"- %s")
          fi
          
          BODY="## ${TAG}\n\n${COMMITS}"
          BODY_ESC=$(echo "$BODY" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          
          REPO=${GITHUB_REPOSITORY}
          TOKEN=${GITHUB_TOKEN}
          
          curl -s -X POST "https://api.github.com/repos/${REPO}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"target_commitish\":\"main\",\"name\":\"${TAG}\",\"body\":${BODY_ESC},\"draft\":false,\"prerelease\":false}"
